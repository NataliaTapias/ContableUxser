name: contable_uxser_app
description: SaaS Multi-tenant Accounting & Inventory POS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local Database (Offline-first)
  sqflite: ^2.4.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Networking
  dio: ^5.7.0

  # Supabase (Backend as a Service)
  supabase_flutter: ^2.8.1

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  connectivity_plus: ^6.1.1
  image_picker: ^1.1.2

  # UI
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  percent_indicator: ^4.2.4
  fl_chart: ^0.69.2
  barcode_scan2: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
